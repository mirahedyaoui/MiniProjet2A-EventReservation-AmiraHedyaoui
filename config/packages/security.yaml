security:
    # 1. Hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Où trouver les utilisateurs
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 3. Les pare-feu (Firewalls) - DOIVENT être décalés à droite
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Firewall spécifique pour la connexion et génération du Token
        login:
            pattern: ^/api/login_check
            stateless: true
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Firewall pour protéger toutes les autres routes API
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        # Firewall par défaut
        main:
            lazy: true
            provider: app_user_provider

    # 4. Contrôle d'accès (Access Control)
    access_control:
        # Route de login accessible à tous
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        # Lecture des événements accessible à tous (GET)
        - { path: ^/api/events, roles: PUBLIC_ACCESS, methods: [GET] }
        # Modification des événements réservée à l'ADMIN (POST, PUT, DELETE)
        - { path: ^/api/events, roles: ROLE_ADMIN, methods: [POST, PUT, DELETE] }