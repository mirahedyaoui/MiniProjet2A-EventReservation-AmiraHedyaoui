security:
    # 1. Hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Fournisseur d'utilisateurs
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 3. Firewalls
    firewalls:
        # Dev (profiling)
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Login classique JWT
        login:
            pattern: ^/api/login_check
            stateless: true
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Endpoints Passkey / WebAuthn
        auth_api:
            pattern: ^/api/auth/(register|login)
            stateless: true
            security: false

        # API principale protégée par JWT
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        # Firewall par défaut pour les autres routes
        main:
            lazy: true
            provider: app_user_provider

    # 4. Contrôle d'accès
    access_control:
        # Routes publiques
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/(register|login), roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }

        # Routes protégées
        - { path: ^/api, roles: ROLE_USER }